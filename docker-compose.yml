services:
  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: "jdbc:mysql://db:3306/oophotel?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC"
      DB_USER: oophotel
      DB_PASSWORD: oophotel

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: oophotel
      MYSQL_USER: oophotel
      MYSQL_PASSWORD: oophotel
    ports:
      # host 3307 -> container 3306 (avoids clashing with a local MySQL already on 3306)
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      # load schema.sql on first DB start
      - ./database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 3s
      retries: 12

volumes:
  db_data:
