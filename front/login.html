<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — OOP Hotel</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/forms.css" />
    <link rel="stylesheet" href="css/login.css" />
</head>
<body>

<div class="auth-page">

    <aside class="auth-visual">
        <a href="index.html" class="auth-logo">OOP <span>Hotel</span></a>
        <div class="auth-visual-content">
            <h1 class="auth-visual-heading">Member area</h1>
            <p class="auth-visual-body">
                Sign in to manage your reservations and see your saved rooms.
            </p>
        </div>
    </aside>

    <main class="auth-form-panel">
        <div class="auth-form-wrap">

            <a href="index.html" class="auth-back">← Back to site</a>

            <div class="auth-tabs" role="tablist">
                <button class="auth-tab active" id="tab-login" role="tab" aria-selected="true">Sign in</button>
                <button class="auth-tab" id="tab-signup" role="tab" aria-selected="false">Create account</button>
            </div>

            <section id="panel-login" class="auth-panel">
                <h2 class="auth-heading">Welcome back</h2>
                <p class="auth-sub">Sign in to continue to your reservations.</p>

                <form id="login-form" novalidate>
                    <div class="field">
                        <label for="login-email">Email address</label>
                        <input type="email" id="login-email" name="email" placeholder="you@example.com" required />
                        <span class="field-error" data-for="login-email"></span>
                    </div>
                    <div class="field">
                        <label for="login-password">Password</label>
                        <div class="password-row">
                            <input type="password" id="login-password" name="password" placeholder="Enter your password" required minlength="6" />
                            <button type="button" class="toggle-pw" data-target="login-password" aria-label="Show password">Show</button>
                        </div>
                        <span class="field-error" data-for="login-password"></span>
                    </div>
                    <div class="field-row">
                        <label class="checkbox">
                            <input type="checkbox" id="remember-me" />
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="auth-link-small">Forgot password?</a>
                    </div>
                    <button type="submit" class="form-submit">Sign in</button>
                    <p class="form-status" id="login-status"></p>
                </form>
            </section>

            <section id="panel-signup" class="auth-panel hidden">
                <h2 class="auth-heading">Create your account</h2>
                <p class="auth-sub">Join OOP Hotel to book faster next time.</p>

                <form id="signup-form" novalidate>
                    <div class="field">
                        <label for="signup-name">Full name</label>
                        <input type="text" id="signup-name" name="name" placeholder="Your full name" required />
                        <span class="field-error" data-for="signup-name"></span>
                    </div>
                    <div class="field">
                        <label for="signup-email">Email address</label>
                        <input type="email" id="signup-email" name="email" placeholder="you@example.com" required />
                        <span class="field-error" data-for="signup-email"></span>
                    </div>
                    <div class="field">
                        <label for="signup-dob">Date of birth</label>
                        <input type="date" id="signup-dob" name="dob" required />
                        <span class="field-error" data-for="signup-dob"></span>
                    </div>
                    <div class="field">
                        <label for="signup-password">Password</label>
                        <div class="password-row">
                            <input type="password" id="signup-password" name="password" placeholder="At least 8 characters" required minlength="8" />
                            <button type="button" class="toggle-pw" data-target="signup-password" aria-label="Show password">Show</button>
                        </div>
                        <span class="field-error" data-for="signup-password"></span>
                    </div>
                    <div class="field">
                        <label for="signup-confirm">Confirm password</label>
                        <input type="password" id="signup-confirm" name="confirm" placeholder="Re-enter your password" required />
                        <span class="field-error" data-for="signup-confirm"></span>
                    </div>
                    <label class="checkbox terms-row">
                        <input type="checkbox" id="agree-terms" required />
                        <span>I agree to the <a href="#" class="auth-link-small">Terms</a> and <a href="#" class="auth-link-small">Privacy Policy</a></span>
                    </label>
                    <button type="submit" class="form-submit">Create account</button>
                    <p class="form-status" id="signup-status"></p>
                </form>
            </section>

        </div>
    </main>

</div>

<script src="js/login.js"></script>
</body>
</html>
